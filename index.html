<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerte JLM</title>
    <style>
        /* Optimisé pour écran OLED (noir = économie batterie) */
        body { font-family: sans-serif; text-align: center; margin: 0; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; justify-content: center; transition: background 0.3s; }
        .t { font-size: 2em; font-weight: bold; }
        .c { font-size: 4em; margin: 20px 0; font-family: monospace; }
        #l { font-size: 0.8em; opacity: 0.6; position: fixed; bottom: 20px; width: 100%; }
        /* Couleurs d'alerte */
        .safe { background: #1a1a1a; } /* Gris sombre au lieu de vert pour la discrétion */
        .danger { background: #ff0000; color: #fff; }
        .wait { background: #ff8c00; color: #fff; }
    </style>
</head>
<body id="b" class="safe">

    <div id="status" class="t">INITIALISATION...</div>
    <div id="timer" class="c">--:--</div>
    <div id="l">Vérification en cours...</div>

    <script>
        const CITY = "ירושלים";
        // Proxy de secours plus rapide
        const URL = "https://www.oref.org.il/WarningMessages/alert/alerts.json";
        const PROXY = "https://api.allorigins.win/get?url=";
        
        let isD = false;
        let countdown = null;

        async function check() {
            const log = document.getElementById('l');
            try {
                // nocache indispensable pour le temps réel
                const r = await fetch(PROXY + encodeURIComponent(URL + "?v=" + Date.now()));
                if (!r.ok) throw 0;
                const d = await r.json();
                
                // Analyse du contenu (cas vide = pas d'alerte)
                const data = d.contents ? JSON.parse(d.contents) : null;
                const active = data && data.data && data.data.includes(CITY);

                if (active && !isD) {
                    startD();
                } else if (!active && isD) {
                    startW();
                } else if (!active && !isD && !countdown) {
                    setSafe();
                }
                log.innerText = "Dernière synchro : " + new Date().toLocaleTimeString();
            } catch (e) {
                log.innerText = "Erreur réseau (Le serveur bloque peut-être)";
            }
        }

        function startD() {
            isD = true;
            clearInterval(countdown);
            countdown = null;
            document.getElementById('b').className = "danger";
            document.getElementById('status').innerText = "⚠️ ALERTE : ABRI !";
            document.getElementById('timer').innerText = "VITE";
        }

        function startW() {
            isD = false;
            document.getElementById('b').className = "wait";
            document.getElementById('status').innerText = "ATTENTE (DÉBRIS)";
            let s = 600; // 10 minutes
            if(countdown) clearInterval(countdown);
            countdown = setInterval(() => {
                s--;
                let m = Math.floor(s/60), sec = s%60;
                document.getElementById('timer').innerText = `${m}:${sec < 10 ? '0' : ''}${sec}`;
                if(s <= 0) setSafe();
            }, 1000);
        }

        function setSafe() {
            isD = false;
            clearInterval(countdown);
            countdown = null;
            document.getElementById('b').className = "safe";
            document.getElementById('status').innerText = "CIEL DÉGAGÉ";
            document.getElementById('timer').innerText = "OK";
        }

        // Rafraîchissement automatique toutes les 3 secondes
        setInterval(check, 3000);
        check();

        // Le "Refresh en glissant" est automatique sur Chrome/Safari mobile 
        // dès que la page peut défiler. On force un petit scroll pour l'activer.
        window.onpageshow = () => { document.body.style.height = "101vh"; };
    </script>
</body>
</html>
