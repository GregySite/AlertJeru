<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JLM ALERT LIVE</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #121212; color: white; height: 100vh; display: flex; flex-direction: column; justify-content: center; text-align: center; transition: background 0.5s; }
        .city { font-size: 1.2rem; opacity: 0.6; text-transform: uppercase; }
        .status { font-size: 2.5rem; font-weight: 900; margin: 15px 0; }
        .timer { font-size: 4rem; font-weight: bold; font-family: monospace; }
        #log { position: fixed; bottom: 15px; width: 100%; font-size: 0.7rem; opacity: 0.5; }
        
        /* États de couleur */
        .safe { background-color: #1b5e20; }
        .danger { background-color: #b71c1c; animation: pulse 1s infinite; }
        .wait { background-color: #e65100; }

        @keyframes pulse { 0% {opacity: 1;} 50% {opacity: 0.8;} 100% {opacity: 1;} }
    </style>
</head>
<body class="safe" id="b">

    <div class="city">Jérusalem / ירושלים</div>
    <div id="s" class="status">SURVEILLANCE...</div>
    <div id="t" class="timer">OK</div>
    
    <div id="log">Connexion au flux RedAlert...</div>

    <script>
        const CITY_HE = "ירושלים";
        const CITY_EN = "Jerusalem";
        // Flux public RedAlert (CORS autorisé)
        const API_URL = "https://api.redalert.me/alerts";

        let isDanger = false;
        let countdown = null;

        async function update() {
            const log = document.getElementById('log');
            try {
                // On récupère les alertes en cours
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // On cherche si Jérusalem est dans la liste
                const alertActive = data.some(a => 
                    (a.cities && (a.cities.includes(CITY_HE) || a.cities.includes(CITY_EN)))
                );

                if (alertActive && !isDanger) {
                    setDanger();
                } else if (!alertActive && isDanger) {
                    startWaiting();
                } else if (!alertActive && !isDanger && !countdown) {
                    setSafe();
                }

                log.innerText = "Dernière synchro : " + new Date().toLocaleTimeString();
            } catch (e) {
                log.innerText = "Erreur de flux (Tentative...)";
            }
        }

        function setDanger() {
            isDanger = true;
            if (countdown) clearInterval(countdown);
            document.getElementById('b').className = "danger";
            document.getElementById('s').innerText = "⚠️ À L'ABRI !";
            document.getElementById('t').innerText = "VITE";
        }

        function startWaiting() {
            isDanger = false;
            document.getElementById('b').className = "wait";
            document.getElementById('s').innerText = "SÉCURITÉ (10m)";
            
            let seconds = 600; 
            if (countdown) clearInterval(countdown);
            countdown = setInterval(() => {
                seconds--;
                let m = Math.floor(seconds / 60);
                let s = seconds % 60;
                document.getElementById('t').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (seconds <= 0) {
                    clearInterval(countdown);
                    countdown = null;
                    setSafe();
                }
            }, 1000);
        }

        function setSafe() {
            isDanger = false;
            document.getElementById('b').className = "safe";
            document.getElementById('s').innerText = "CIEL DÉGAGÉ";
            document.getElementById('t').innerText = "RAS";
        }

        // Vérification toutes les 4 secondes
        setInterval(update, 4000);
        update();
    </script>
</body>
</html>
