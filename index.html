<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JLM DIRECT</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; justify-content: center; text-align: center; transition: 0.3s; }
        .city { font-size: 1.2rem; opacity: 0.6; }
        .status { font-size: 2.5rem; font-weight: 900; margin: 10px 0; }
        .timer { font-size: 5rem; font-weight: bold; font-family: monospace; }
        #log { position: fixed; bottom: 10px; width: 100%; font-size: 0.7rem; opacity: 0.4; }
        /* Couleurs */
        .safe { background: #1b5e20; }
        .danger { background: #b71c1c; }
        .wait { background: #e65100; }
    </style>
</head>
<body class="safe" id="b">

    <div class="city">ירושלים (Jérusalem)</div>
    <div id="s" class="status">VÉRIFICATION...</div>
    <div id="t" class="timer">--:--</div>
    
    <div id="log">Connexion directe...</div>

    <script>
        const CITY = "ירושלيم"; 
        // On utilise un service de rebond spécifique aux alertes en Israël qui autorise le CORS
        const URL = "https://api.redalert.me/alerts"; 

        let isD = false, countdown = null;

        async function update() {
            try {
                const r = await fetch(URL, { mode: 'cors' });
                const data = await r.json();
                
                // On cherche si Jérusalem est dans la liste des alertes actives
                // Note: Ce flux renvoie souvent les noms de villes en hébreu ou anglais
                const active = data.some(a => a.cities && (a.cities.includes(CITY) || a.cities.includes("Jerusalem")));

                if (active && !isD) {
                    isD = true; clearInterval(countdown);
                    document.getElementById('b').className = "danger";
                    document.getElementById('s').innerText = "⚠️ À L'ABRI !";
                    document.getElementById('t').innerText = "VITE";
                } else if (!active && isD) {
                    isD = false; startWait();
                } else if (!active && !isD && !countdown) {
                    document.getElementById('b').className = "safe";
                    document.getElementById('s').innerText = "CIEL DÉGAGÉ";
                    document.getElementById('t').innerText = "OK";
                }
                document.getElementById('log').innerText = "Sync: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('log').innerText = "Erreur de flux - Tentative...";
            }
        }

        function startWait() {
            document.getElementById('b').className = "wait";
            document.getElementById('s').innerText = "SÉCURITÉ DÉBRIS";
            let s = 600;
            countdown = setInterval(() => {
                s--;
                document.getElementById('t').innerText = Math.floor(s/60) + ":" + (s%60).toString().padStart(2,'0');
                if (s <= 0) { clearInterval(countdown); countdown = null; update(); }
            }, 1000);
        }

        setInterval(update, 3000);
        update();
    </script>
</body>
</html>
