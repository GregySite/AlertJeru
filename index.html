<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Oref</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; display: flex; flex-direction: column; justify-content: center; height: 100vh; transition: background 0.4s; background: #2ecc71; color: white; }
        .t { font-size: 2.5em; font-weight: 900; }
        .c { font-size: 5em; font-weight: bold; margin: 10px 0; }
        #l { position: absolute; bottom: 20px; width: 100%; font-size: 0.7em; opacity: 0.8; }
        .danger { background: #e74c3c; }
        .wait { background: #f39c12; }
    </style>
</head>
<body id="b">
    <div id="status" class="t">CHARGEMENT...</div>
    <div id="timer" class="c"></div>
    <div id="l">Vérification...</div>

    <script>
        const CITY = "ירושלים";
        // Proxy alternatif spécifique pour contourner les blocages récents
        const URL = "https://www.oref.org.il/WarningMessages/History/AlertsHistory.json";
        const PROXY = "https://api.allorigins.win/get?url=";
        
        let isD = false;
        let timer = null;

        async function check() {
            try {
                const r = await fetch(PROXY + encodeURIComponent(URL + "?t=" + Date.now()));
                const d = await r.json();
                const alerts = JSON.parse(d.contents);

                // On vérifie si Jérusalem est dans les alertes récentes
                const active = alerts && alerts.length > 0 && alerts[0].data.includes(CITY);

                if (active && !isD) {
                    goDanger();
                } else if (!active && isD) {
                    goWait();
                }
                document.getElementById('l').innerText = "Sync: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('l').innerText = "Erreur réseau - Recalibrage...";
            }
        }

        function goDanger() {
            isD = true;
            clearInterval(timer);
            document.getElementById('b').className = "danger";
            document.getElementById('status').innerText = "⚠️ ABRI IMMÉDIAT";
            document.getElementById('timer').innerText = "VITE";
        }

        function goWait() {
            isD = false;
            document.getElementById('b').className = "wait";
            document.getElementById('status').innerText = "SÉCURITÉ (DEBRIS)";
            let s = 600;
            timer = setInterval(() => {
                s--;
                let m = Math.floor(s/60);
                let sec = s%60;
                document.getElementById('timer').innerText = m + ":" + (sec < 10 ? "0" : "") + sec;
                if(s <= 0) goSafe();
            }, 1000);
        }

        function goSafe() {
            clearInterval(timer);
            document.getElementById('b').className = "";
            document.getElementById('status').innerText = "CIEL DÉGAGÉ";
            document.getElementById('timer').innerText = "";
        }

        setInterval(check, 4000);
        check();
    </script>
</body>
</html>
